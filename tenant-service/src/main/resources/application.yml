server:
  port: 8082

spring:
  application:
    name: tenant-service
  
  datasource:
    url: jdbc:mysql://${DB_HOST:investment-tracker-db.cr0cww8oy52m.ap-south-1.rds.amazonaws.com}:3306/${DB_NAME_TENANT:investment_tracker_db}?useSSL=false&allowPublicKeyRetrieval=true
