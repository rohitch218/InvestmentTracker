app:
  backend-url: http://${BACKEND_HOST:localhost}:8080
  auth-url: http://${AUTH_HOST:localhost}:8083
  portfolio-url: http://${PORTFOLIO_HOST:localhost}:8084
  transaction-url: http://${TRANSACTION_HOST:localhost}:8085
  audit-url: http://${AUDIT_HOST:localhost}:8086
  jwt:
    secret: ${JWT_SECRET:your-256-bit-super-secure-secret-key-change-in-production}

server:
  port: 8081

spring:
  application:
    name: gateway-service
  
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:5173"
              - "http://localhost"
              - "http://localhost:80"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # Auth Routes -> AUTH SERVICE
        - id: auth-route
          uri: ${app.auth-url}
          predicates:
            - Path=/api/v1/auth/**, /v3/api-docs/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - RewritePath=/v3/api-docs/auth/(?<remaining>.*), /v3/api-docs/${remaining}

        # Investment Routes -> PORTFOLIO SERVICE
        - id: investment-route
          uri: ${app.portfolio-url}
          predicates:
            - Path=/api/v1/investments/**, /v3/api-docs/portfolio/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: portfolioCircuitBreaker
                fallbackUri: forward:/fallback/portfolio
            - RewritePath=/v3/api-docs/portfolio/(?<remaining>.*), /v3/api-docs/${remaining}
        
        # Dashboard Routes -> PORTFOLIO SERVICE
        - id: dashboard-route
          uri: ${app.portfolio-url}
          predicates:
            - Path=/api/v1/dashboard/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: portfolioCircuitBreaker
                fallbackUri: forward:/fallback/portfolio

        # Transaction Routes -> TRANSACTION SERVICE
        - id: transaction-route
          uri: ${app.transaction-url}
          predicates:
            - Path=/api/v1/transactions/**, /v3/api-docs/transaction/**
          filters:
            - name: CircuitBreaker
              args:
                name: transactionCircuitBreaker
                fallbackUri: forward:/fallback/transaction
            - RewritePath=/v3/api-docs/transaction/(?<remaining>.*), /v3/api-docs/${remaining}

        # Audit Routes -> AUDIT SERVICE
        - id: audit-route
          uri: ${app.audit-url}
          predicates:
            - Path=/api/v1/audit/**, /v3/api-docs/audit/**
          filters:
            - RewritePath=/v3/api-docs/audit/(?<remaining>.*), /v3/api-docs/${remaining}

  # Redis for Rate Limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      authCircuitBreaker:
        baseConfig: default
      portfolioCircuitBreaker:
        baseConfig: default
      transactionCircuitBreaker:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 2s

# Aggregated Swagger UI for Gateway
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth-Service
        url: /v3/api-docs/auth
      - name: Portfolio-Service
        url: /v3/api-docs/portfolio
      - name: Transaction-Service
        url: /v3/api-docs/transaction
      - name: Audit-Service
        url: /v3/api-docs/audit
